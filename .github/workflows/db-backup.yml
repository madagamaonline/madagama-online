name: Database backup

# Nightly off-site backup of the Neon Postgres database to Cloudflare R2.
# This is the independent recovery path called out in the production-readiness review.
# Cloudflare R2 provides a free 10GB tier with $0 egress fees.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   BACKUP_DATABASE_URL  Direct (non-pooled) Postgres connection string. Use the
#                        DIRECT_URL value from .env, NOT the pgbouncer/pooled URL.
#   R2_ACCESS_KEY_ID     Cloudflare R2 Access Key ID.
#   R2_SECRET_ACCESS_KEY Cloudflare R2 Secret Access Key.
#   R2_ENDPOINT          Cloudflare R2 Endpoint (e.g. https://<id>.r2.cloudflarestorage.com).
#   R2_BUCKET            Cloudflare R2 Bucket name (e.g. madagama-db-backups).

on:
  schedule:
    - cron: "0 20 * * *" # 20:00 UTC daily = 01:30 Asia/Colombo (off-hours)
  workflow_dispatch: {} # allow manual runs from the Actions tab

concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Must be >= the Neon server's Postgres major version (pg_dump refuses to
      # dump a newer server). Bump this when Neon upgrades.
      PG_MAJOR: "18"
    steps:
      - name: Check required secrets
        env:
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${BACKUP_DATABASE_URL}" ]; then echo "::error::BACKUP_DATABASE_URL secret is not set"; missing=1; fi
          if [ -z "${R2_ACCESS_KEY_ID}" ]; then echo "::error::R2_ACCESS_KEY_ID secret is not set"; missing=1; fi
          if [ -z "${R2_SECRET_ACCESS_KEY}" ]; then echo "::error::R2_SECRET_ACCESS_KEY secret is not set"; missing=1; fi
          if [ -z "${R2_ENDPOINT}" ]; then echo "::error::R2_ENDPOINT secret is not set"; missing=1; fi
          if [ -z "${R2_BUCKET}" ]; then echo "::error::R2_BUCKET secret is not set"; missing=1; fi
          if [ "$missing" = "1" ]; then exit 1; fi
          echo "Required secrets are present."

      - name: Install PostgreSQL ${{ env.PG_MAJOR }} client
        run: |
          set -euo pipefail
          sudo install -d /usr/share/postgresql-common/pgdg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo tee /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc >/dev/null
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y "postgresql-client-${PG_MAJOR}"
          # The runner ships an older pg client whose /usr/bin/pg_dump wrapper
          # otherwise wins on PATH. Put the just-installed major version first so
          # later steps resolve to it.
          echo "/usr/lib/postgresql/${PG_MAJOR}/bin" >> "$GITHUB_PATH"
          "/usr/lib/postgresql/${PG_MAJOR}/bin/pg_dump" --version

      - name: Dump database and upload to Cloudflare R2
        env:
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          stamp="$(date -u +%Y%m%dT%H%M%SZ)"
          file="madagama-${stamp}.sql.gz"
          echo "Dumping database to ${file} ..."
          pg_dump --no-owner --no-privileges --clean --if-exists "$BACKUP_DATABASE_URL" \
            | gzip -9 > "$file"
          ls -lh "$file"
          
          # Guard against a silently truncated/empty dump
          if [ "$(stat -c%s "$file")" -lt 1024 ]; then
            echo "::error::Dump file is suspiciously small (<1KB) - aborting upload"
            exit 1
          fi
          
          echo "Uploading to Cloudflare R2 bucket ${R2_BUCKET} ..."
          aws s3 cp "$file" "s3://${R2_BUCKET}/${file}" --endpoint-url "$R2_ENDPOINT"
